<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tele-Saúde Criciúma - Marcar Consulta</title>
    <link rel="stylesheet" href="agendar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-heart-pulse"></i> Tele-Saúde <span>Criciúma</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="index.html#servicos">Serviços</a></li>
                <li><a href="agendar.html" class="active">Agendar</a></li>
                <li><a href="paciente.html">Área do Paciente</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
        <a href="paciente.html" class="btn-nav">Aceder ao Portal</a>
    </header>

    <section class="booking-section">
        <div class="form-container">
            <h2>Agende a sua Teleconsulta</h2>
            <p>Preencha os dados abaixo para marcar o seu atendimento médico virtual em poucos minutos.</p>
            
            <form class="booking-form">
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" placeholder="Introduza o seu nome completo" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="specialty">Especialidade Médica</label>
                        <select id="specialty" required>
                            <option value="" disabled selected>Selecione a especialidade</option>
                            <option value="clinica-geral">Clínica Geral</option>
                            <option value="pediatria">Pediatria</option>
                            <option value="psicologia">Psicologia / Saúde Mental</option>
                            <option value="cardiologia">Cardiologia</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="date">Data Desejada</label>
                        <input type="date" id="date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="time">Horário de Preferência</label>
                    <select id="time" required>
                        <option value="" disabled selected>Selecione o turno</option>
                        <option value="manha">Manhã (08:00 - 12:00)</option>
                        <option value="tarde">Tarde (13:00 - 18:00)</option>
                        <option value="noite">Noite (18:00 - 22:00)</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Confirmar Pré-Agendamento</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Tele-Saúde Criciúma. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
